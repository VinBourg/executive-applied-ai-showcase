name: smoke-tests

on:
  push:
  pull_request:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile Python files
        run: |
          python -m py_compile \
            01_RAG_Knowledge_Assistant/app.py \
            01_RAG_Knowledge_Assistant/core.py \
            01_RAG_Knowledge_Assistant/fastapi_app.py \
            02_Fraud_Risk_Scoring/app.py \
            03_KPI_Reporting_Pipeline/app.py \
            03_KPI_Reporting_Pipeline/metrics.py \
            03_KPI_Reporting_Pipeline/streamlit_app.py \
            04_SQL_Decision_Support/app.py \
            05_Brochure_Content_Workflow/app.py \
            06_Customer_Segmentation_Clustering/app.py \
            07_Time_Series_Forecasting/app.py \
            08_Agentic_Knowledge_Routing/app.py \
            09_n8n_Lead_Enrichment_Automation/app.py \
            09_n8n_Lead_Enrichment_Automation/test_lead_enrichment.py \
            10_Dashboard_Brief_Generator/app.py \
            11_n8n_AI_Support_Automation/app.py \
            12_Agentic_Research_Briefing/app.py \
            13_AI_SQL_Analytics_Copilot/app.py \
            13_AI_SQL_Analytics_Copilot/test_copilot.py \
            14_LLM_Evaluation_Guardrails/app.py \
            15_n8n_Document_Intake_Approval/app.py \
            16_Cloud_Data_Platform_Governance/app.py

      - name: Run core demos
        run: |
          python 01_RAG_Knowledge_Assistant/app.py
          python 02_Fraud_Risk_Scoring/app.py
          python 03_KPI_Reporting_Pipeline/app.py
          python 04_SQL_Decision_Support/app.py
          python 05_Brochure_Content_Workflow/app.py
          python 06_Customer_Segmentation_Clustering/app.py
          python 07_Time_Series_Forecasting/app.py
          python 08_Agentic_Knowledge_Routing/app.py
          python 09_n8n_Lead_Enrichment_Automation/app.py
          python 09_n8n_Lead_Enrichment_Automation/test_lead_enrichment.py
          python 10_Dashboard_Brief_Generator/app.py
          python 11_n8n_AI_Support_Automation/app.py
          python 12_Agentic_Research_Briefing/app.py
          python 13_AI_SQL_Analytics_Copilot/app.py
          python 13_AI_SQL_Analytics_Copilot/test_copilot.py
          python 14_LLM_Evaluation_Guardrails/app.py
          python 15_n8n_Document_Intake_Approval/app.py
          python 16_Cloud_Data_Platform_Governance/app.py
