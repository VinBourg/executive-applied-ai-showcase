<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Cloud Data Platform Governance Flow</title>
  <desc id="desc">Visual flow showing how datasets are scored, gated and released for trusted BI and AI use.</desc>
