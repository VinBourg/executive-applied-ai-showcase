  <text x="916" y="312" fill="#14324a" font-family="Arial, Helvetica, sans-serif" font-size="20">Power BI</text>
  <text x="916" y="340" fill="#14324a" font-family="Arial, Helvetica, sans-serif" font-size="20">Analytics</text>
  <text x="916" y="368" fill="#14324a" font-family="Arial, Helvetica, sans-serif" font-size="20">AI workflows</text>
