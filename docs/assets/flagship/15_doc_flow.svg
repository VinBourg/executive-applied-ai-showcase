  <text x="90" y="158" fill="#d6dfeb" font-family="Arial, Helvetica, sans-serif" font-size="22">Controlled document automation with validation and explicit human-in-the-loop routing.</text>
  <rect x="92" y="220" width="220" height="150" rx="22" fill="#f7f2e9"/>
