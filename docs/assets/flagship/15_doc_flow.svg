  <text x="384" y="340" fill="#14324a" font-family="Arial, Helvetica, sans-serif" font-size="20">Field extraction</text>
  <text x="384" y="368" fill="#14324a" font-family="Arial, Helvetica, sans-serif" font-size="20">Completeness check</text>
  <rect x="620" y="220" width="220" height="150" rx="22" fill="#f7f2e9"/>
  <text x="654" y="270" fill="#14324a" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Validate</text>
