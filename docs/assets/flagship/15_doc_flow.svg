  <text x="916" y="312" fill="#14324a" font-family="Arial, Helvetica, sans-serif" font-size="20">Auto approve</text>
  <text x="916" y="340" fill="#14324a" font-family="Arial, Helvetica, sans-serif" font-size="20">Ops review</text>
  <text x="916" y="368" fill="#14324a" font-family="Arial, Helvetica, sans-serif" font-size="20">Legal review</text>
