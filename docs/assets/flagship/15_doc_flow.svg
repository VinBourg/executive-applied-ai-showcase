<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">n8n Document Intake Approval Flow</title>
  <desc id="desc">Visual flow showing how document intake is classified, validated and routed to automatic or human approval.</desc>
